server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json
        image/svg+xml;
    gzip_min_length 1000;

    # ── API proxy → FastAPI backend ───────────────────────────────────────────
    # All /api/ requests are forwarded to the backend container.
    # aarogya_backend resolves via Docker's internal DNS using the container name.
    location /api/ {
        proxy_pass         http://aarogya_backend:8000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts suitable for LLM calls (can take 30–60 s)
        proxy_read_timeout    120s;
        proxy_connect_timeout  10s;
        proxy_send_timeout     30s;

        # Disable buffering for streaming responses
        proxy_buffering off;
    }

    # ── Health endpoint for nginx itself ──────────────────────────────────────
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Static assets — long cache ────────────────────────────────────────────
    # Vite appends content hashes to asset filenames, so they are immutable.
    location ~* \.(js|css|woff2?|png|jpg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA fallback — all other routes serve index.html ─────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff"         always;
    add_header X-Frame-Options         "SAMEORIGIN"      always;
    add_header Referrer-Policy         "strict-origin"   always;
}
